[web]
${env.WEB_IP} ansible_user=ec2-user ansible_ssh_private_key_file=/home/vedant/key.pem

[app]
${env.APP_IP} ansible_user=ec2-user ansible_ssh_private_key_file=/home/vedant/key.pem

[app:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p ec2-user@${env.WEB_IP} -i /home/vedant/key.pem"'
