- name: Configure Web Server
  hosts: web
  become: yes

  tasks:
    - name: Install httpd
      dnf:
        name: httpd
        state: present

    - name: Start httpd
      service:
        name: httpd
        state: started
        enabled: true


- name: Configure App Server
  hosts: app
  become: yes

  tasks:
    - name: Update package cache
      dnf:
        update_cache: yes

    - name: Install python3
      dnf:
        name: python3
        state: present
