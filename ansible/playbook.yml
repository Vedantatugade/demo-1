- name: Install Nginx on Web Tier
  hosts: web
  become: yes
  gather_facts: no

  tasks:

    - name: Enable nginx repo
      shell: amazon-linux-extras enable nginx1

    - name: Install nginx
      yum:
        name: nginx
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes


- name: Install MySQL on App Tier
  hosts: app
  become: yes
  gather_facts: no

  tasks:

    - name: Install MySQL server
      shell: |
        dnf update -y
        dnf install mysql-server -y

    - name: Start MySQL
      service:
        name: mysqld
        state: started
        enabled: yes
