- name: Configure Web Server (Nginx)
  hosts: web
  become: yes

  tasks:
    - name: Update package cache
      dnf:
        update_cache: yes

    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true


- name: Configure App Server (MySQL)
  hosts: app
  become: yes

  tasks:
    - name: Update package cache
      dnf:
        update_cache: yes

    - name: Install MySQL Server
      dnf:
        name: mysql-server
        state: present

    - name: Start and enable MySQL
      service:
        name: mysqld
        state: started
        enabled: true

    - name: Ensure MySQL is running
      shell: systemctl status mysqld
      register: mysql_status

    - debug:
        var: mysql_status.stdout
